name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  code-quality:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:

          token: ${{ secrets.GITHUB_TOKEN }}

          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: swatinem/rust-cache@v2


      - name: Fix formatting (fmt)
        run: cargo fmt --all


      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix Rust code formatting"
          file_pattern: "*.rs"

      - name: Run linter (clippy)
        run: cargo clippy --all-targets --all-features

  build-and-release:
    if: github.event_name == 'release'
    needs: code-quality
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Build Binaries
        run: cargo build --release -p particles -p wave -p triangulate

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/particles.exe
            target/release/wave.exe
            target/release/triangulate.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}